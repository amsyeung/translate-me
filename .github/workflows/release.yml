name: Build & Create Release with Dist Zip

# Support tag push auto release + manual trigger button
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target_ref:
        description: Target git tag/branch to build
        required: true
        default: main

permissions:
  contents: write # Permission to create release & upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension (generate dist/)
        run: npm run build

      - name: Zip dist folder
        run: zip -r translate-me-${{ github.ref_name }}.zip dist/

      - name: Create GitHub Release & Upload zip asset
        uses: softprops/action-gh-release@v2
        with:
          files: translate-me-${{ github.ref_name }}.zip
          name: Release ${{ github.ref_name }}
          generate_release_notes: true