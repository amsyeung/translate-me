name: Build & Create Release with Dist Zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # release, upload

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension (generate dist/)
        run: npm run build

      - name: Zip dist folder
        run: zip -r translate-me-${{ github.ref_name }}.zip dist/

      - name: Create GitHub Release & Upload dist.zip
        uses: softprops/action-gh-release@v2
        with:
          files: dist.zip
          # Release title
          name: Release ${{ github.ref_name }}
          # auto-print commit as logs
          generate_release_notes: true
